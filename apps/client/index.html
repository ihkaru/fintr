<!doctype html>
<html lang="id">
  <head>
    <script>
      (function() {
        const hash = window.location.hash;
        if (hash && hash.includes("state=mobile") && hash.includes("id_token=")) {
          const params = new URLSearchParams(hash.substring(1));
          const idToken = params.get("id_token");
          if (idToken) {
            const appSchemeUrl = "com.fintr.famivault://oauth?id_token=" + encodeURIComponent(idToken);
            
            // Lakukan pengalihan otomatis ke aplikasi
            window.location.href = appSchemeUrl;
            
            // Masukkan style dan UI fallback untuk menghentikan loading Vue app
            document.write(\`
              <style>
                #app { display: none !important; }
                .redirect-container {
                  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                  justify-content: center;
                  height: 100vh;
                  background-color: #f4fbf7;
                  color: #0f5238;
                  text-align: center;
                  padding: 24px;
                  box-sizing: border-box;
                }
                .redirect-box {
                  max-width: 400px;
                  background: white;
                  padding: 32px;
                  border-radius: 16px;
                  box-shadow: 0 4px 24px rgba(15, 82, 56, 0.08);
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                }
                .spinner {
                  border: 3px solid rgba(15, 82, 56, 0.1);
                  width: 40px;
                  height: 40px;
                  border-radius: 50%;
                  border-left-color: #0f5238;
                  animation: spin 1s linear infinite;
                  margin-bottom: 24px;
                }
                h2 { margin: 0 0 12px 0; font-size: 20px; font-weight: 600; }
                p { margin: 0 0 24px 0; font-size: 14px; color: #55625c; line-height: 1.5; }
                .btn {
                  display: inline-flex;
                  align-items: center;
                  justify-content: center;
                  background-color: #0f5238;
                  color: white;
                  border: none;
                  padding: 12px 24px;
                  font-size: 14px;
                  font-weight: 600;
                  border-radius: 8px;
                  cursor: pointer;
                  text-decoration: none;
                  transition: background-color 0.2s;
                }
                .btn:hover {
                  background-color: #0b3d29;
                }
                @keyframes spin {
                  0% { transform: rotate(0deg); }
                  100% { transform: rotate(360deg); }
                }
              </style>
              <div class="redirect-container">
                <div class="redirect-box">
                  <div class="spinner"></div>
                  <h2>Menghubungkan ke FamiVault...</h2>
                  <p>Silakan klik tombol di bawah jika Anda tidak dialihkan kembali ke aplikasi secara otomatis.</p>
                  <a href="\${appSchemeUrl}" class="btn">Buka Aplikasi</a>
                </div>
              </div>
            \`);
          }
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#FAF3E0" />
    <meta
      name="description"
      content="FamiVault — Kelola keuangan rumah tangga dengan sistem amplop digital bersama pasangan"
    />
    <title>FamiVault — Family Envelope Budgeting</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/js/app.ts"></script>
  </body>
</html>
