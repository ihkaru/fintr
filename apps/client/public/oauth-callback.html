<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>Menghubungkan ke FamiVault...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f4fbf7;
      color: #0f5238;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .container {
      max-width: 400px;
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(15, 82, 56, 0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .spinner {
      border: 3px solid rgba(15, 82, 56, 0.1);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border-left-color: #0f5238;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 20px;
      font-weight: 600;
    }
    p {
      margin: 0 0 24px 0;
      font-size: 14px;
      color: #55625c;
      line-height: 1.5;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #0f5238;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #0b3d29;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h2>Menghubungkan ke aplikasi...</h2>
    <p>Silakan tunggu sementara kami mengalihkan Anda kembali ke aplikasi FamiVault.</p>
    <a id="fallback-btn" class="btn" style="display: none;">Buka Aplikasi Manual</a>
  </div>

  <script>
    // Ambil hash dari URL (Google mengembalikan token di hash/fragment)
    const hash = window.location.hash || window.location.search;
    if (hash) {
      // Hilangkan tanda '#' atau '?' di awal
      const params = new URLSearchParams(hash.substring(1));
      const idToken = params.get("id_token");
      
      if (idToken) {
        // Skema URL custom aplikasi Android/iOS
        const appSchemeUrl = "com.fintr.famivault://oauth?id_token=" + encodeURIComponent(idToken);
        
        // Trigger redirect ke aplikasi
        window.location.href = appSchemeUrl;
        
        // Tampilkan tombol cadangan jika redirect otomatis gagal/terhalang browser
        setTimeout(() => {
          const btn = document.getElementById("fallback-btn");
          if (btn) {
            btn.href = appSchemeUrl;
            btn.style.display = "inline-flex";
          }
        }, 1500);
      } else {
        showError("Token Google tidak ditemukan di URL. Silakan coba masuk kembali.");
      }
    } else {
      showError("Informasi autentikasi tidak valid atau sudah kedaluwarsa.");
    }

    function showError(msg) {
      const container = document.querySelector(".container");
      container.innerHTML = `
        <span style="font-size: 48px; margin-bottom: 16px;">⚠️</span>
        <h2>Gagal Masuk</h2>
        <p>${msg}</p>
        <a href="/" class="btn">Kembali ke Beranda PWA</a>
      `;
    }
  </script>
</body>
</html>
