services:
  postgres:
    image: postgres:16-alpine
    container_name: fintr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fintr
      POSTGRES_PASSWORD: fintr_secret
      POSTGRES_DB: fintr
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintr"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
